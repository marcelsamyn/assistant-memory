services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5431:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6380:6379"

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - ./minio-data:/data
    command: server /data --console-address ":9001"

  # File-conversion sidecar used by the ingest-file worker. Wraps
  # Microsoft's MarkItDown (PDF/DOCX/XLSX/PPTX/HTML/RTF/EPUB/audio/images)
  # behind a small FastAPI surface — see services/markitdown/server.py.
  # Image is built and pushed by .github/workflows/markitdown-build.yml;
  # the Memory worker reaches it on the internal compose network at
  # http://markitdown:8080 (no host port needed).
  markitdown:
    image: ghcr.io/marcelsamyn/assistant-memory-markitdown:latest

volumes:
  postgres_data:
  redis_data:
